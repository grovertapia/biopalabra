<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BioPalabra Pro - Versión Final</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { 
            --bio-green: #2e7d32; 
            --bio-accent: #8bc34a; 
            --bio-fail: #d32f2f; 
            /* MEDIDAS ESTRICTAS SOLICITADAS */
            --f-def: 32px;  /* Doble del tamaño estándar */
            --f-letra: 42px; 
            --box-size: 44px; /* fuente (36) + 1/9 (4) = 40px */
        }
        body { font-family: sans-serif; background: #f1f8e9; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        
        .header-game { width: 100%; display: flex; justify-content: space-between; padding: 10px; position: fixed; top: 0; background: #f1f8e9; z-index: 10; }
        .timer { background: var(--bio-fail); color: white; padding: 5px 10px; border-radius: 10px; font-weight: bold; }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 95%; max-width: 500px; margin-top: 60px; text-align: center; }
        
        /* Definición: Tamaño Duplicado */
        #definicion { font-size: var(--f-def); color: #2c3e50; line-height: 1.2; border-left: 10px solid var(--bio-accent); padding-left: 15px; text-align: left; margin-bottom: 20px; font-weight: bold; }

        #respuesta-usuario { border-bottom: 3px solid var(--bio-green); min-height: 40px; font-size: 24px; font-weight: bold; color: var(--bio-green); margin-bottom: 20px; letter-spacing: 2px; }

        /* Contenedor Centrado */
        .letras-contenedor { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }

        /* RECUADRO VERDE: Tamaño fuente + 1/3 exacto */
        .letra-btn { 
            background: var(--bio-green); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: var(--f-letra) !important;
            width: var(--box-size) !important;
            height: var(--box-size) !important;
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0;
        }
        .letra-btn:disabled { opacity: 0; }

        .controles { display: flex; gap: 5px; justify-content: center; margin-top: 20px; }
        .btn-ui { border: none; padding: 10px; border-radius: 5px; color: white; font-weight: bold; font-size: 12px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:20px; border-radius:10px; text-align:center; width:80%; }
    </style>
</head>
<body>

<div class="header-game">
    <div class="timer">⏳ <span id="time-val">30</span>s</div>
    <div style="font-weight:bold">Aciertos: <span id="val-aciertos">0</span></div>
</div>

<div id="modalPista" class="modal">
    <div class="modal-content">
        <p>¿Gastar 1 acierto por la pista?</p>
        <button onclick="confirmarPista()" style="background:var(--bio-green); color:white; padding:10px 20px; border:none; border-radius:5px;">SÍ</button>
        <button onclick="cerrarModal()" style="background:var(--bio-fail); color:white; padding:10px 20px; border:none; border-radius:5px;">NO</button>
    </div>
</div>

<div class="card">
    <div id="definicion">Cargando...</div>
    <div id="respuesta-usuario"></div>
    <div class="letras-contenedor" id="banco-letras"></div>
    <div class="controles">
        <button onclick="abrirModal()" class="btn-ui" style="background:#00bcd4">💡 Pista</button>
        <button onclick="mezclarLetrasActuales()" class="btn-ui" style="background:#ff9800">🔀 Mix</button>
        <button onclick="limpiarRespuesta()" class="btn-ui" style="background:var(--bio-fail)">❌ Borrar</button>
    </div>
</div>

<script>
    const URL_DE_SU_HOJA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThIT0WPjDkvKled_w8-SRy3wt8ObeXLw4INzbFf5urZtvCAa4dPiHALUTqdO_sZmZfFGnkF9WW5i00/pub?gid=0&single=true&output=csv"; 
    const bancoRespaldo = [
        { palabra: "MITOSIS", def: "Proceso de división nuclear que produce dos núcleos idénticos." },
        { palabra: "CARIOTIPO", def: "Conjunto de cromosomas de una célula o individuo." },
        { palabra: "GEN", def: "Unidad funcional y física de la herencia." }
    ];

    let bancoDatos = [];
    let actual = 0;
    let intento = "";
    let aciertos = 0;
    let tiempoRestante = 30;
    let timerId;
    const mensajesAliento = ["¡Excelente razonamiento!", "¡Eres un genio de la biología!", "¡Respuesta correcta, colega!", "¡Tu sinapsis está a tope!"];

    async function cargarDatos() {
        try {
            const res = await fetch(URL_DE_SU_HOJA);
            const data = await res.text();
            const filas = data.split("\n").slice(1);
            bancoDatos = filas.map(f => {
                const c = f.split(",");
                return { palabra: c[0].trim().toUpperCase(), def: c[1].trim() };
            }).filter(i => i && i.palabra.length > 0);
        } catch (e) { bancoDatos = bancoRespaldo; }
        
        if(bancoDatos.length === 0) bancoDatos = bancoRespaldo;
        
        // ALEATORIEDAD: Algoritmo Fisher-Yates
        for (let i = bancoDatos.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [bancoDatos[i], bancoDatos[j]] = [bancoDatos[j], bancoDatos[i]];
        }
        
        iniciarJuego();
    }

    function iniciarJuego() {
        clearInterval(timerId);
        tiempoRestante = 30;
        document.getElementById('time-val').innerText = tiempoRestante;
        if (actual >= bancoDatos.length) { alert("¡Felicidades! Completaste el banco de datos."); actual = 0; }
        
        intento = "";
        document.getElementById('respuesta-usuario').innerText = "";
        document.getElementById('definicion').innerText = bancoDatos[actual].def;
        
        const letras = bancoDatos[actual].palabra.split('').sort(() => Math.random() - 0.5);
        renderLetras(letras);
        
        timerId = setInterval(() => {
            tiempoRestante--;
            document.getElementById('time-val').innerText = tiempoRestante;
            if (tiempoRestante <= 0) { clearInterval(timerId); alert("¡Tiempo agotado!"); iniciarJuego(); }
        }, 1000);
    }

    function renderLetras(letrasArray) {
        const contenedor = document.getElementById('banco-letras');
        contenedor.innerHTML = "";
        const mitad = Math.ceil(letrasArray.length / 2);
        
        letrasArray.forEach((L, index) => {
            let btn = document.createElement('button');
            btn.className = "letra-btn";
            btn.innerText = L;
            btn.onclick = () => {
                intento += L;
                document.getElementById('respuesta-usuario').innerText = intento;
                btn.disabled = true;
                verificar();
            };
            if (index === mitad) {
                let br = document.createElement('div');
                br.style.flexBasis = "100%";
                contenedor.appendChild(br);
            }
            contenedor.appendChild(btn);
        });
    }

    function verificar() {
        if (intento === bancoDatos[actual].palabra) {
            clearInterval(timerId);
            if(tiempoRestante > 20) {
                const msg = mensajesAliento[Math.floor(Math.random() * mensajesAliento.length)];
                alert(msg);
            }
            aciertos++;
            document.getElementById('val-aciertos').innerText = aciertos;
            setTimeout(() => { actual++; iniciarJuego(); }, 500);
        } else if (intento.length === bancoDatos[actual].palabra.length) {
            alert("Incorrecto.");
            limpiarRespuesta();
        }
    }

    function abrirModal() { if(aciertos > 0) document.getElementById('modalPista').style.display = "flex"; else alert("No tienes puntos."); }
    function cerrarModal() { document.getElementById('modalPista').style.display = "none"; }
    function confirmarPista() {
        aciertos--;
        document.getElementById('val-aciertos').innerText = aciertos;
        alert("Comienza con: " + bancoDatos[actual].palabra[0]);
        cerrarModal();
    }

    function limpiarRespuesta() {
        intento = "";
        document.getElementById('respuesta-usuario').innerText = "";
        document.querySelectorAll('.letra-btn').forEach(b => b.disabled = false);
    }

    function mezclarLetrasActuales() {
        limpiarRespuesta();
        renderLetras(bancoDatos[actual].palabra.split('').sort(() => Math.random() - 0.5));
    }

    cargarDatos();
</script>
</body>
</html>
